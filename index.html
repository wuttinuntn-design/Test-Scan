<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ทดสอบสแกนบาร์โค้ด</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --coral:#E2583E;
    --teal:#3fa9b4;
    --bg:#0f1720;
    --card:#182430;
    --text:#eef2f5;
    --muted:#8a97a3;
    --border:#26333f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:16px;
  }
  .wrap{max-width:480px;margin:0 auto;}
  h1{
    font-size:20px;
    margin:4px 0 2px;
  }
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
  }
  #reader{
    width:100%;
    border-radius:10px;
    overflow:hidden;
    background:#000;
  }
  .btns{display:flex;gap:10px;margin-top:12px;}
  button{
    flex:1;
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-start{background:var(--coral);color:#fff;}
  .btn-stop{background:#2a3641;color:var(--text);}
  .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);flex:0 0 auto;padding:12px 16px;}
  #status{
    font-size:13px;
    color:var(--teal);
    margin-top:10px;
    min-height:16px;
  }
  .manual{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .manual input{
    flex:1;
    background:#0f1720;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-size:15px;
  }
  .manual button{
    flex:0 0 auto;
    background:var(--teal);
    color:#06222a;
    padding:10px 16px;
  }
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{
    text-align:left;
    padding:8px 6px;
    border-bottom:1px solid var(--border);
  }
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;}
  td.code{font-family:"SF Mono",Consolas,monospace;color:var(--teal);}
  td.time{color:var(--muted);font-size:12px;white-space:nowrap;}
  .empty{color:var(--muted);text-align:center;padding:20px 0;font-size:14px;}
  .count{
    display:inline-block;
    background:var(--coral);
    color:#fff;
    font-size:12px;
    border-radius:20px;
    padding:2px 10px;
    margin-left:6px;
  }
  .del{color:var(--muted);cursor:pointer;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📷 ทดสอบสแกนบาร์โค้ด</h1>
  <div class="sub">สแกนด้วยกล้อง หรือพิมพ์เลขบาร์โค้ดเอง (จำลองปืนยิงบาร์โค้ด)</div>

  <div class="card">
    <div id="reader"></div>
    <div class="btns">
      <button class="btn-start" id="startBtn">เริ่มสแกน</button>
      <button class="btn-stop" id="stopBtn" style="display:none;">หยุดสแกน</button>
    </div>
    <div id="status"></div>

    <div class="manual">
      <input type="text" id="manualInput" placeholder="พิมพ์เลขบาร์โค้ดแล้วกด Enter" autocomplete="off">
      <button id="manualBtn">เพิ่ม</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div>รายการที่บันทึก <span class="count" id="countBadge">0</span></div>
      <button class="btn-clear" id="clearBtn">ล้างทั้งหมด</button>
    </div>
    <div id="listArea">
      <div class="empty">ยังไม่มีรายการ — ลองสแกนหรือพิมพ์ดูครับ</div>
    </div>
  </div>
</div>

<script>
let html5QrCode = null;
let scanning = false;
let records = []; // {code, time}

const readerEl = document.getElementById('reader');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusEl = document.getElementById('status');
const listArea = document.getElementById('listArea');
const countBadge = document.getElementById('countBadge');
const manualInput = document.getElementById('manualInput');
const manualBtn = document.getElementById('manualBtn');
const clearBtn = document.getElementById('clearBtn');

function fmtTime(d){
  return d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function addRecord(code){
  if(!code) return;
  records.unshift({code: code, time: new Date()});
  renderList();
  statusEl.textContent = 'บันทึกแล้ว: ' + code;
  if(navigator.vibrate) navigator.vibrate(80);
}

function renderList(){
  countBadge.textContent = records.length;
  if(records.length === 0){
    listArea.innerHTML = '<div class="empty">ยังไม่มีรายการ — ลองสแกนหรือพิมพ์ดูครับ</div>';
    return;
  }
  let rows = records.map((r, i) => `
    <tr>
      <td class="code">${r.code}</td>
      <td class="time">${fmtTime(r.time)}</td>
      <td class="del" onclick="removeRecord(${i})">ลบ</td>
    </tr>
  `).join('');
  listArea.innerHTML = `
    <table>
      <thead><tr><th>บาร์โค้ด</th><th>เวลา</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function removeRecord(i){
  records.splice(i, 1);
  renderList();
}
window.removeRecord = removeRecord;

async function startScan(){
  readerEl.style.display = 'block';
  html5QrCode = new Html5Qrcode("reader");
  try{
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (decodedText) => {
        addRecord(decodedText);
      },
      (errorMessage) => { /* ignore per-frame no-scan errors */ }
    );
    scanning = true;
    startBtn.style.display = 'none';
    stopBtn.style.display = 'block';
    statusEl.textContent = 'กล้องพร้อมสแกน...';
  }catch(err){
    statusEl.textContent = 'เปิดกล้องไม่ได้: ' + err;
  }
}

async function stopScan(){
  if(html5QrCode && scanning){
    await html5QrCode.stop();
    html5QrCode.clear();
    scanning = false;
  }
  startBtn.style.display = 'block';
  stopBtn.style.display = 'none';
  statusEl.textContent = 'หยุดสแกนแล้ว';
}

startBtn.addEventListener('click', startScan);
stopBtn.addEventListener('click', stopScan);

manualBtn.addEventListener('click', () => {
  const v = manualInput.value.trim();
  if(v){ addRecord(v); manualInput.value=''; manualInput.focus(); }
});
manualInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    const v = manualInput.value.trim();
    if(v){ addRecord(v); manualInput.value=''; }
  }
});
clearBtn.addEventListener('click', () => {
  if(records.length && confirm('ล้างรายการทั้งหมด?')){
    records = [];
    renderList();
  }
});
</script>
</body>
</html>
